<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" fill="none">
  <!-- Beaver mascot holding ruler - WHITE version for dark backgrounds -->
  <g transform="translate(5, 4)">
    <!-- Body -->
    <ellipse cx="26" cy="32" rx="18" ry="20" fill="white"/>
    <!-- Head -->
    <circle cx="26" cy="16" r="14" fill="white"/>
    <!-- Inner face -->
    <ellipse cx="26" cy="18" rx="10" ry="9" fill="#F0F0F0"/>
    <!-- Eyes -->
    <circle cx="21" cy="15" r="2.5" fill="#10367D"/>
    <circle cx="31" cy="15" r="2.5" fill="#10367D"/>
    <circle cx="21.8" cy="14.5" r="1.2" fill="#0A2456"/>
    <circle cx="31.8" cy="14.5" r="1.2" fill="#0A2456"/>
    <!-- Nose -->
    <ellipse cx="26" cy="20" rx="2.5" ry="1.8" fill="#0A2456"/>
    <!-- Teeth -->
    <rect x="24" y="22" width="2" height="3" rx="0.5" fill="#F8FAFC"/>
    <rect x="26.5" y="22" width="2" height="3" rx="0.5" fill="#F8FAFC"/>
    <!-- Ears -->
    <circle cx="14" cy="8" r="4" fill="white"/>
    <circle cx="14" cy="8" r="2.2" fill="#F0F0F0"/>
    <circle cx="38" cy="8" r="4" fill="white"/>
    <circle cx="38" cy="8" r="2.2" fill="#F0F0F0"/>
    <!-- Tail -->
    <ellipse cx="8" cy="44" rx="8" ry="4" fill="#E0E0E0" transform="rotate(-20 8 44)"/>
    <line x1="8" y1="41" x2="8" y2="47" stroke="white" stroke-width="0.8"/>
    <line x1="4" y1="43" x2="12" y2="43" stroke="white" stroke-width="0.8"/>
    <!-- Arms/Paws holding ruler -->
    <ellipse cx="14" cy="32" rx="4" ry="3" fill="#F0F0F0"/>
    <ellipse cx="38" cy="32" rx="4" ry="3" fill="#F0F0F0"/>
    <!-- Ruler -->
    <rect x="10" y="28" width="32" height="5" rx="1" fill="#FF6B2C"/>
    <line x1="14" y1="28" x2="14" y2="31" stroke="white" stroke-width="0.6"/>
    <line x1="18" y1="28" x2="18" y2="30" stroke="white" stroke-width="0.4"/>
    <line x1="22" y1="28" x2="22" y2="31" stroke="white" stroke-width="0.6"/>
    <line x1="26" y1="28" x2="26" y2="30" stroke="white" stroke-width="0.4"/>
    <line x1="30" y1="28" x2="30" y2="31" stroke="white" stroke-width="0.6"/>
    <line x1="34" y1="28" x2="34" y2="30" stroke="white" stroke-width="0.4"/>
    <line x1="38" y1="28" x2="38" y2="31" stroke="white" stroke-width="0.6"/>
    <!-- Feet -->
    <ellipse cx="20" cy="50" rx="5" ry="3" fill="#E0E0E0"/>
    <ellipse cx="32" cy="50" rx="5" ry="3" fill="#E0E0E0"/>
  </g>
  <!-- Text "ConstruData" -->
  <text x="65" y="38" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="white">
    ConstruData
  </text>
</svg>
