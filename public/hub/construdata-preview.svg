      <stop offset="50%" stop-color="#000" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0a1628" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="shadow1" x="-10%" y="-10%" width="130%" height="140%">
