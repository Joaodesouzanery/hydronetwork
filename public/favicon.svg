<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Beaver mascot only (no text) - minimalist favicon -->
  <g transform="translate(6, 2)">
    <!-- Body -->
    <ellipse cx="26" cy="36" rx="20" ry="22" fill="#10367D"/>
    <!-- Head -->
    <circle cx="26" cy="18" r="16" fill="#10367D"/>
    <!-- Inner face -->
    <ellipse cx="26" cy="20" rx="11" ry="10" fill="#1A4A9E"/>
    <!-- Eyes -->
    <circle cx="20" cy="17" r="3" fill="white"/>
    <circle cx="32" cy="17" r="3" fill="white"/>
    <circle cx="21" cy="16.5" r="1.5" fill="#0A2456"/>
    <circle cx="33" cy="16.5" r="1.5" fill="#0A2456"/>
    <!-- Nose -->
    <ellipse cx="26" cy="22" rx="3" ry="2" fill="#0A2456"/>
    <!-- Teeth -->
    <rect x="24" y="24.5" width="2" height="3.5" rx="0.5" fill="white"/>
    <rect x="27" y="24.5" width="2" height="3.5" rx="0.5" fill="white"/>
    <!-- Ears -->
    <circle cx="12" cy="8" r="5" fill="#10367D"/>
    <circle cx="12" cy="8" r="2.8" fill="#1A4A9E"/>
    <circle cx="40" cy="8" r="5" fill="#10367D"/>
    <circle cx="40" cy="8" r="2.8" fill="#1A4A9E"/>
    <!-- Tail -->
    <ellipse cx="6" cy="50" rx="9" ry="4.5" fill="#0A2456" transform="rotate(-20 6 50)"/>
    <line x1="6" y1="47" x2="6" y2="53" stroke="#10367D" stroke-width="1"/>
    <line x1="2" y1="49.5" x2="10" y2="49.5" stroke="#10367D" stroke-width="1"/>
    <!-- Arms/Paws holding ruler -->
    <ellipse cx="12" cy="36" rx="5" ry="3.5" fill="#1A4A9E"/>
    <ellipse cx="40" cy="36" rx="5" ry="3.5" fill="#1A4A9E"/>
    <!-- Ruler -->
    <rect x="8" y="32" width="36" height="6" rx="1.5" fill="#A5CE00"/>
    <line x1="13" y1="32" x2="13" y2="35.5" stroke="white" stroke-width="0.8"/>
    <line x1="18" y1="32" x2="18" y2="34.5" stroke="white" stroke-width="0.5"/>
    <line x1="23" y1="32" x2="23" y2="35.5" stroke="white" stroke-width="0.8"/>
    <line x1="28" y1="32" x2="28" y2="34.5" stroke="white" stroke-width="0.5"/>
    <line x1="33" y1="32" x2="33" y2="35.5" stroke="white" stroke-width="0.8"/>
    <line x1="38" y1="32" x2="38" y2="34.5" stroke="white" stroke-width="0.5"/>
    <!-- Feet -->
    <ellipse cx="20" cy="56" rx="6" ry="3.5" fill="#0A2456"/>
    <ellipse cx="34" cy="56" rx="6" ry="3.5" fill="#0A2456"/>
  </g>
</svg>
